server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed filenames still change between builds; avoid "immutable" here so
    # localhost Docker users see UI updates after rebuild without clearing cache.
    location /assets/ {
        add_header Cache-Control "public, max-age=0, must-revalidate";
        try_files $uri =404;
    }

    # SPA: no-cache for all non-asset routes (try_files fallback uses same location — = /index.html alone misses /products etc.)
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        expires off;
        etag off;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8081/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Ensure JWT header is forwarded reliably (some setups drop it implicitly).
        proxy_set_header Authorization $http_authorization;
    }

    location /images/ {
        proxy_pass http://backend:8081/images/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }
}
