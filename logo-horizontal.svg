<svg width="340" height="72" viewBox="0 0 340 72" xmlns="http://www.w3.org/2000/svg">
  <!-- Icon mark background - pure black -->
  <rect x="0" y="0" width="72" height="72" rx="16" fill="#0f1318"/>
  <!-- Subtle inner highlight top edge -->
  <rect x="0" y="0" width="72" height="36" rx="16" fill="rgba(255,255,255,0.04)"/>

  <!-- House silhouette -->
  <g transform="translate(9,9)" fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
    <!-- Roof -->
    <polyline points="3,27 27,7 51,27" stroke-width="2.8"/>
    <!-- Walls -->
    <polyline points="9,25 9,50 45,50 45,25" stroke-width="2.8"/>
    <!-- Door -->
    <rect x="20" y="34" width="14" height="16" rx="2.5" stroke-width="2.4" fill="none"/>
  </g>

  <!-- Clock circle - top-right of house, partially overlapping -->
  <circle cx="51" cy="21" r="11" fill="#0f1318" stroke="#ffffff" stroke-width="2.4"/>
  <!-- Clock face: 12 tick -->
  <line x1="51" y1="13" x2="51" y2="16" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <!-- Clock hands: pointing ~2:10 -->
  <line x1="51" y1="21" x2="51" y2="15" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="51" y1="21" x2="57" y2="24" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Clock center dot -->
  <circle cx="51" cy="21" r="1.4" fill="#ffffff"/>

  <!-- Separator -->
  <line x1="88" y1="18" x2="88" y2="56" stroke="#e0e3e8" stroke-width="1.2"/>

  <!-- Wordmark -->
  <text x="104" y="34"
    font-family="'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
    font-size="22" font-weight="800" fill="#0f1318" letter-spacing="-0.6">Online</text>
  <text x="105" y="56"
    font-family="'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
    font-size="15" font-weight="500" fill="#6e7580" letter-spacing="0.3">Rental System</text>
</svg>
